services:
  db:
    image: postgres:16-alpine
    container_name: decidetab_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - decidetab_net

  backend:
    build:
      context: ./backend
    container_name: decidetab_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "4000:4000"
    networks:
      - decidetab_net

  frontend:
    build:
      context: ./frontend
    container_name: decidetab_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - decidetab_net

volumes:
  db_data:

networks:
  decidetab_net:
    driver: bridge
